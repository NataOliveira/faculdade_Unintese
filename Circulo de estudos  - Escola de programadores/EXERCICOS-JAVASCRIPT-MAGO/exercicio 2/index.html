<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">

</head>
<body id="corpo">
    <div class="section">
        <div class="divInput">
            <input  id="inputNum" placeholder="Digite um número" type="number">
        </div>
        <div class="funcoes">
            <button class="btn"  data-operacao="tabuada">Tabuada</button>
            <button class="btn"  data-operacao="pares">Números Pares</button>
            <button class="btn"  data-operacao="soma">Soma de Intervalo</button>
            <button class="btn"  data-operacao="fatorial">Fatorial</button>
            <button class="btn"  data-operacao="primo">Validar Primo</button>
        </div>
        <div class="sectionResultado">
            <h2 id="resultado"></h2>
        </div>
    </div>
</body>
</html>
