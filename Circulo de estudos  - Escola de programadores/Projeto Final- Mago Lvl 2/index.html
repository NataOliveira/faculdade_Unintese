<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Final</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <section class="hero">

        <div class="carrossel">

           <button id="prevDesktop" class="btn">&lt;</button>
           <div class="apis">

                <div id="track">

                    <div class="slide">
                        
                        <div class="card-tradutor">
                            <h2 id="tituloApi" >Tadutor API</h2>
                            <div class="caixa-texto">
                                <label for="textoOriginal">Texto Original (Inglês):</label>
                                <textarea id="textoOriginal" placeholder="Digite ou cole a frase aqui..."></textarea>
                            </div>

                            <button id="btnTraduzir" class="btn-traduzir">Traduzir Texto</button>

                            <div class="caixa-texto">
                                <label for="textoTraduzido">Tradução (Português):</label>
                                <div id="textoTraduzido" class="painel-resultado">Sua tradução aparecerá aqui...</div>
                            </div>
                        </div>
                    </div>

                    <div class="slide">

                        <h2 id="tituloApi" >The Simpsons API</h2>

                        <div class="divFoto">
                            <button id="prevPersonagem"  class="btnPrev">Prev</button>
                            <div class="fotoPersonagemdiv">
                                <img id="char-foto" class="fotoPersonagem" src="" alt="Carregando personagem..." />
                            </div>
                            <button id="nextPersonagem"  class="btnNext">Next</button>
                        </div>

                        <div class="dadosPersonagem">
                            
                            <h2 id="char-nome"></h2>
                            <h2 id="char-trabalho"></h2>
                            <h2 id="char-idade"></h2>
                            <h2 id="char-status"></h2>
                            <h4 id="char-frase"></h4>
                    
                        </div>
                        
                    </div>

                </div>

            </div>
            <button id="nextDesktop"  class="btn">&gt;</button>

            <div class="btnsMobile">
                <button id="prevMobile" class="btnMbl">&lt;&lt; Anterior</button>
                <button id="nextMobile" class="btnMbl">Próximo &gt;&gt;</button>
            </div>

        </div>
          
        <audio id="audioVolte" src="audio/volte.mp3"></audio>
        <audio id="audioVoltou" src="audio/voltou.mp3"></audio>

    </section>
</body>
</html>
